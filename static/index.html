<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopLedger</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>ShopLedger</h1>
    <p id="month-label">Loading...</p>
  </header>

  <main>
    <section class="dashboard">
      <div class="card">
        <h2>Sales</h2>
        <p class="number" id="total-sales">—</p>
      </div>
      <div class="card">
        <h2>Expenses</h2>
        <p class="number" id="total-expenses">—</p>
      </div>
      <div class="card">
        <h2>Profit</h2>
        <p class="number" id="profit">—</p>
      </div>
      <div class="card">
        <h2>Outstanding udhaar</h2>
        <p class="number" id="udhaar">—</p>
      </div>
    </section>
  </main>
<section class="actions">
      <button id="open-sale-modal" class="primary-btn">+ Add Sale</button>
      <button id="open-expense-modal" class="primary-btn">+ Add Expense</button>
    </section>

    <div id="sale-modal" class="modal hidden">
      <div class="modal-content">
        <header class="modal-header">
          <h2>Add Sale</h2>
          <button class="close-btn" data-modal="sale-modal">&times;</button>
        </header>
        <form id="sale-form">
          <label>
            Item
            <input type="text" name="item" required />
            <span class="error" id="sale-item-error"></span>
          </label>
          <label>
            Quantity
            <input type="number" name="quantity" min="1" required />
            <span class="error" id="sale-quantity-error"></span>
          </label>
          <label>
            Price (₹)
            <input type="number" name="price" min="0.01" step="0.01" required />
            <span class="error" id="sale-price-error"></span>
          </label>
          <label>
            Customer ID (optional)
            <input type="number" name="customer_id" min="1" />
            <span class="error" id="sale-customer-error"></span>
          </label>
          <button type="submit" class="submit-btn">Save</button>
        </form>
      </div>
    </div>

    <div id="expense-modal" class="modal hidden">
      <div class="modal-content">
        <header class="modal-header">
          <h2>Add Expense</h2>
          <button class="close-btn" data-modal="expense-modal">&times;</button>
        </header>
        <form id="expense-form">
          <label>
            Category
            <input type="text" name="category" required />
            <span class="error" id="expense-category-error"></span>
          </label>
          <label>
            Amount (₹)
            <input type="number" name="amount" min="0.01" step="0.01" required />
            <span class="error" id="expense-amount-error"></span>
          </label>
          <label>
            Supplier (optional)
            <input type="text" name="supplier" />
            <span class="error" id="expense-supplier-error"></span>
          </label>
          <button type="submit" class="submit-btn">Save</button>
        </form>
      </div>
    </div>

  <script src="/app.js"></script>
</body>
</html>
