<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopLedger</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>ShopLedger</h1>
    <p id="month-label">Loading...</p>
  </header>

  <main>
    <section class="dashboard">
      <div class="card">
        <h2>Sales</h2>
        <p class="number" id="total-sales">—</p>
      </div>
      <div class="card">
        <h2>Expenses</h2>
        <p class="number" id="total-expenses">—</p>
      </div>
      <div class="card">
        <h2>Profit</h2>
        <p class="number" id="profit">—</p>
      </div>
      <div class="card">
        <h2>Outstanding udhaar</h2>
        <p class="number" id="udhaar">—</p>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
